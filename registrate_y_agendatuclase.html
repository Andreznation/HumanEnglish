<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regístrate y Agenda tu Clase - HumanEnglish</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        form {
            max-width: 600px;
            margin: 0 auto;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;

        }
    </style>

<body>
    <h1>Regístrate y Agenda tu Clase</h1>
    <p>Completa el formulario a continuación para registrarte y agendar tu primera clase de inglés con nosotros.</p>
    
    <form action="guardar_registro.php" method="post">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="celular">Número de Celular:</label>
        <input type="tel" id="celular" name="celular" required>

        <button type="submit">Enviar Registro</button>
    </form>
